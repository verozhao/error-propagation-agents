# Frozen experiment configuration — do not modify after Day 0
# All runs consume this file for reproducibility

models:
  pipeline:
    llama-3.1-8b: "meta.llama3-1-8b-instruct-v1:0"
    claude-haiku-3: "claude-3-haiku-20240307"
    claude-sonnet-3-7: "claude-3-7-sonnet-20250219-v1:0"   # Lineup E only
    claude-sonnet-4: "claude-sonnet-4-20250514-v1:0"
  judges:
    primary: "claude-3-haiku-20240307"
    secondary: "claude-3-haiku-20240307"   # only one judge available — note as limitation
    step_scorer: "meta.llama3-1-8b-instruct-v1:0"   # gateway, free for all intents

parameters:
  temperature: 0.7
  max_tokens: 1024
  trials_per_cell: 15
  seed_formula: "sha256(model + query + step + trial_idx)"

pipelines:
  short: ["search", "compose", "verify"]
  medium: ["search", "filter", "summarize", "compose", "verify"]
  self_refine_A:
    steps: ["search", "filter", "summarize", "compose", "verify"]
    feedback: {after: "compose", max_iter: 2, inject_mode: "before_loop"}
  self_refine_C:
    steps: ["search", "filter", "summarize", "compose", "verify"]
    feedback: {after: "compose", max_iter: 2, inject_mode: "at_critique"}
  # semantics B: post-refinement injection, not run in main sweep due to budget
  self_refine_B:
    steps: ["search", "filter", "summarize", "compose", "verify"]
    feedback: {after: "compose", max_iter: 2, inject_mode: "after_loop"}

injection:
  method: "rule-based"
  taxonomy: "FAVA (Mishra et al., 2024) mapped from RAGTruth (Niu et al., 2024)"
  weights_file: "error_operation_taxonomy.json"
  types: ["entity", "invented", "unverifiable", "contradictory"]

queries:
  sources:
    multi_hop: {dataset: "HotpotQA", n: 60}
    single_hop: {dataset: "TriviaQA", n: 60}
    reasoning: {dataset: "StrategyQA", n: 60}
    agentic: {dataset: "BFCL", n: 30}
    synthetic_novel: {generated: true, n: 30}

severity_encoders:
  primary: "BAAI/bge-large-en-v1.5"
  validation: ["intfloat/e5-large-v2", "sentence-transformers/all-mpnet-base-v2"]

analysis:
  headline_tests: 10
  headline_correction: "Holm"
  exploratory_correction: "Benjamini-Hochberg FDR"
  bootstrap_resamples: 10000
  equivalence_bounds: [-0.10, 0.10]
  persistence_threshold: 0.1
